<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg viewBox="-100 0 890 420" width="843" height="398"
     role="img" aria-labelledby="title desc" version="1.1"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <title id="title">From zimbo to agent — what structural memory ignites</title>
  <desc id="desc">Two brain silhouettes side by side. The left brain is dark with scattered disconnected belief dots that glow faintly but don't connect — a zimbo that monitors but doesn't own. The right brain is ignited: the same dots are connected by glowing indigo, teal, and amber edges forming a belief hypergraph, with a Bella mark at the brain stem. Labels contrast: no guilt / persistent, not identical / identical, not consistent / disputeful, not responsible / responsible.</desc>

  <defs>
    <radialGradient id="glowIndigo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgb(99,102,241)" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="rgb(99,102,241)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgb(16,185,129)" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="rgb(16,185,129)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowAmber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgb(245,158,11)" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="rgb(245,158,11)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowDim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgb(148,163,184)" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="rgb(148,163,184)" stop-opacity="0"/>
    </radialGradient>
    <!-- ignited interior glow -->
    <radialGradient id="interiorGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="rgb(99,102,241)" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="rgb(16,185,129)" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="rgb(245,158,11)" stop-opacity="0"/>
    </radialGradient>
    <!-- edge glow filter -->
    <filter id="edgeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dimGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <!-- brain silhouette path (reusable) -->
    <path id="brainShape" d="
      M 0,180
      C 0,135 10,95 30,70
      C 45,50 65,35 90,28
      C 100,25 112,22 120,18
      C 132,12 148,10 160,12
      C 172,14 182,18 190,25
      C 205,38 218,55 225,78
      C 230,92 232,108 232,125
      C 232,145 228,162 222,178
      C 218,188 215,198 215,210
      C 215,225 218,238 215,248
      C 212,258 200,265 185,268
      C 178,270 172,275 168,285
      L 160,310
      C 158,316 152,320 145,320
      L 88,320
      C 81,320 75,316 73,310
      L 65,285
      C 61,275 55,270 48,268
      C 33,265 21,258 18,248
      C 15,238 18,225 18,210
      C 18,198 15,188 11,178
      C 5,162 0,145 0,125
      Z
    "/>
  </defs>

  <!-- ============ Title ============ -->
  <text x="380" y="30" text-anchor="middle"
        font-family="'Space Grotesk', Inter, system-ui, sans-serif"
        font-size="15" font-weight="700" fill="rgb(30,27,75)">From zimbo to agent</text>
  <text x="380" y="48" text-anchor="middle"
        font-family="'Space Grotesk', Inter, system-ui, sans-serif"
        font-size="11" fill="rgb(148,163,184)">what structural memory ignites</text>

  <!-- ============ LEFT BRAIN: zimbo ============ -->
  <g transform="translate(65, 65)">
    <!-- brain fill: dark -->
    <use xlink:href="#brainShape" fill="rgb(30,32,38)" stroke="rgb(71,85,105)" stroke-width="1.5"/>

    <!-- scattered dots: dim, isolated, no edges -->
    <!-- halos first (behind) -->
    <circle cx="75" cy="95" r="14" fill="url(#glowDim)"/>
    <circle cx="145" cy="80" r="14" fill="url(#glowDim)"/>
    <circle cx="115" cy="145" r="14" fill="url(#glowDim)"/>
    <circle cx="55" cy="175" r="14" fill="url(#glowDim)"/>
    <circle cx="160" cy="160" r="14" fill="url(#glowDim)"/>
    <circle cx="90" cy="215" r="14" fill="url(#glowDim)"/>
    <circle cx="145" cy="225" r="14" fill="url(#glowDim)"/>
    <circle cx="170" cy="120" r="14" fill="url(#glowDim)"/>

    <!-- nodes: muted gray, same positions as right side -->
    <circle cx="75" cy="95" r="3.5" fill="rgb(148,163,184)" opacity="0.5"/>
    <circle cx="145" cy="80" r="3.0" fill="rgb(148,163,184)" opacity="0.5"/>
    <circle cx="115" cy="145" r="3.8" fill="rgb(148,163,184)" opacity="0.5"/>
    <circle cx="55" cy="175" r="3.0" fill="rgb(148,163,184)" opacity="0.5"/>
    <circle cx="160" cy="160" r="3.2" fill="rgb(148,163,184)" opacity="0.5"/>
    <circle cx="90" cy="215" r="3.0" fill="rgb(148,163,184)" opacity="0.5"/>
    <circle cx="145" cy="225" r="3.5" fill="rgb(148,163,184)" opacity="0.5"/>
    <circle cx="170" cy="120" r="3.0" fill="rgb(148,163,184)" opacity="0.5"/>

    <!-- specular highlights -->
    <g fill="white" fill-opacity="0.3">
      <circle cx="74" cy="93.5" r="1.0"/>
      <circle cx="144" cy="78.5" r="0.8"/>
      <circle cx="114" cy="143.5" r="1.1"/>
      <circle cx="54" cy="173.5" r="0.8"/>
      <circle cx="159" cy="158.5" r="0.9"/>
      <circle cx="89" cy="213.5" r="0.8"/>
      <circle cx="144" cy="223.5" r="1.0"/>
      <circle cx="169" cy="118.5" r="0.8"/>
    </g>
  </g>

  <!-- zimbo label -->
  <text x="181" y="400" text-anchor="middle"
        font-family="'Space Grotesk', Inter, system-ui, sans-serif"
        font-size="14" font-weight="700" fill="rgb(71,85,105)">zimbo</text>
  <text x="181" y="415" text-anchor="middle"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="9" fill="rgb(148,163,184)" font-style="italic">monitors, but doesn't own</text>

  <!-- zimbo property labels (left side) -->
  <g font-family="'Space Grotesk', Inter, system-ui, sans-serif"
     font-size="13" font-weight="600" fill="rgb(148,163,184)">
    <text x="22" y="112" text-anchor="end">no guilt</text>
    <text x="22" y="172" text-anchor="end">not identical</text>
    <text x="22" y="232" text-anchor="end">not consistent</text>
    <text x="22" y="292" text-anchor="end">not responsible</text>
  </g>
  <!-- thin lines from labels to brain edge -->
  <g stroke="rgb(148,163,184)" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.4">
    <line x1="25" y1="108" x2="65" y2="108"/>
    <line x1="25" y1="168" x2="65" y2="168"/>
    <line x1="25" y1="228" x2="65" y2="228"/>
    <line x1="25" y1="288" x2="65" y2="288"/>
  </g>

  <!-- ============ CENTER: transition arrow ============ -->
  <g transform="translate(345, 200)">
    <!-- arrow body -->
    <line x1="0" y1="0" x2="55" y2="0"
          stroke="rgb(148,163,184)" stroke-width="1.5"/>
    <polygon points="55,-5 68,0 55,5" fill="rgb(148,163,184)"/>
    <!-- label -->
    <text x="34" y="-14" text-anchor="middle"
          font-family="'JetBrains Mono', ui-monospace, monospace"
          font-size="10" font-weight="700" fill="rgb(10,155,100)">bella save</text>
  </g>

  <!-- ============ RIGHT BRAIN: ignited ============ -->
  <g transform="translate(430, 65)">
    <!-- brain fill: lighter gray to contrast with dark zimbo -->
    <use xlink:href="#brainShape" fill="rgb(75,80,95)" stroke="rgb(120,130,150)" stroke-width="1.5"/>
    <!-- interior glow overlay -->
    <use xlink:href="#brainShape" fill="url(#interiorGlow)"/>

    <!-- EDGES first (behind nodes), with glow -->
    <g filter="url(#edgeGlow)" stroke-linecap="round" fill="none" stroke-width="1.3">
      <!-- indigo edges -->
      <line x1="75" y1="95" x2="115" y2="145" stroke="rgb(99,102,241)" stroke-opacity="0.7"/>
      <line x1="115" y1="145" x2="145" y2="225" stroke="rgb(99,102,241)" stroke-opacity="0.45"/>
      <line x1="75" y1="95" x2="145" y2="80" stroke="rgb(99,102,241)" stroke-opacity="0.5"/>

      <!-- teal edges -->
      <line x1="145" y1="80" x2="170" y2="120" stroke="rgb(16,185,129)" stroke-opacity="0.6"/>
      <line x1="170" y1="120" x2="160" y2="160" stroke="rgb(16,185,129)" stroke-opacity="0.55"/>
      <line x1="160" y1="160" x2="145" y2="225" stroke="rgb(16,185,129)" stroke-opacity="0.4"/>

      <!-- amber edges -->
      <line x1="115" y1="145" x2="55" y2="175" stroke="rgb(245,158,11)" stroke-opacity="0.55"/>
      <line x1="55" y1="175" x2="90" y2="215" stroke="rgb(245,158,11)" stroke-opacity="0.5"/>

      <!-- cross-community edges (gray) -->
      <line x1="115" y1="145" x2="160" y2="160" stroke="rgb(148,163,184)" stroke-opacity="0.5"/>
      <line x1="90" y1="215" x2="145" y2="225" stroke="rgb(148,163,184)" stroke-opacity="0.45"/>
      <line x1="75" y1="95" x2="170" y2="120" stroke="rgb(148,163,184)" stroke-opacity="0.35"/>
    </g>

    <!-- ⊥ dispute marker on one edge -->
    <circle cx="85" cy="160" r="6" fill="rgb(30,32,38)" stroke="rgb(245,158,11)" stroke-width="1"/>
    <text x="85" y="163" text-anchor="middle"
          font-family="'JetBrains Mono', monospace" font-size="9"
          fill="rgb(245,158,11)" font-weight="700">⊥</text>

    <!-- ⇒ cause marker on one edge -->
    <text x="158" y="140" text-anchor="middle"
          font-family="'JetBrains Mono', monospace" font-size="9"
          fill="rgb(16,185,129)" font-weight="700">⇒</text>

    <!-- halos (colored, behind nodes) -->
    <circle cx="75" cy="95" r="14" fill="url(#glowIndigo)"/>
    <circle cx="145" cy="80" r="12" fill="url(#glowIndigo)"/>
    <circle cx="115" cy="145" r="16" fill="url(#glowAmber)"/>
    <circle cx="55" cy="175" r="12" fill="url(#glowAmber)"/>
    <circle cx="160" cy="160" r="12" fill="url(#glowTeal)"/>
    <circle cx="90" cy="215" r="12" fill="url(#glowTeal)"/>
    <circle cx="145" cy="225" r="14" fill="url(#glowIndigo)"/>
    <circle cx="170" cy="120" r="12" fill="url(#glowTeal)"/>

    <!-- nodes: bright colored -->
    <circle cx="75" cy="95" r="3.5" fill="rgb(99,102,241)"/>
    <circle cx="145" cy="80" r="3.0" fill="rgb(99,102,241)"/>
    <circle cx="115" cy="145" r="3.8" fill="rgb(245,158,11)"/>
    <circle cx="55" cy="175" r="3.0" fill="rgb(245,158,11)"/>
    <circle cx="160" cy="160" r="3.2" fill="rgb(16,185,129)"/>
    <circle cx="90" cy="215" r="3.0" fill="rgb(16,185,129)"/>
    <circle cx="145" cy="225" r="3.5" fill="rgb(99,102,241)"/>
    <circle cx="170" cy="120" r="3.0" fill="rgb(16,185,129)"/>

    <!-- specular highlights -->
    <g fill="white" fill-opacity="0.7">
      <circle cx="74" cy="93.5" r="1.0"/>
      <circle cx="144" cy="78.5" r="0.8"/>
      <circle cx="114" cy="143.5" r="1.1"/>
      <circle cx="54" cy="173.5" r="0.8"/>
      <circle cx="159" cy="158.5" r="0.9"/>
      <circle cx="89" cy="213.5" r="0.8"/>
      <circle cx="144" cy="223.5" r="1.0"/>
      <circle cx="169" cy="118.5" r="0.8"/>
    </g>

    <!-- Bella label at graph center -->
    <text x="115" y="155" text-anchor="middle"
          font-family="'Space Grotesk', sans-serif"
          font-size="12" font-weight="700" fill="rgb(255,255,255)" opacity="0.75">bella</text>
  </g>

  <!-- ignited label -->
  <text x="546" y="400" text-anchor="middle"
        font-family="'Space Grotesk', Inter, system-ui, sans-serif"
        font-size="14" font-weight="700" fill="rgb(10,155,100)">ignited</text>
  <text x="546" y="415" text-anchor="middle"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="9" fill="rgb(10,155,100)" font-style="italic">owns what it believes</text>

  <!-- ignited property labels (right side) -->
  <g font-family="'Space Grotesk', Inter, system-ui, sans-serif"
     font-size="13" font-weight="600" fill="rgb(10,155,100)">
    <text x="695" y="112">persistent</text>
    <text x="695" y="172">identical</text>
    <text x="695" y="232">disputeful</text>
    <text x="695" y="292">responsible</text>
  </g>
  <!-- thin lines from brain edge to labels -->
  <g stroke="rgb(10,155,100)" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.4">
    <line x1="662" y1="108" x2="692" y2="108"/>
    <line x1="662" y1="168" x2="692" y2="168"/>
    <line x1="662" y1="228" x2="692" y2="228"/>
    <line x1="662" y1="288" x2="692" y2="288"/>
  </g>
</svg>
