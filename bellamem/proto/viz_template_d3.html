<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>bellamem v0.2 — concept map (D3)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  :root {
    --bg: #0b1220;
    --panel: #111827;
    --panel2: #1f2937;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --accent: #a78bfa;
    --n-metaphysical: #f59e0b;
    --n-normative:    #3b82f6;
    --n-factual:      #10b981;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text);
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #app { display: flex; height: 100vh; }
  #graph-pane { flex: 1; position: relative; }
  svg#graph { width: 100%; height: 100%; display: block;
              background: radial-gradient(ellipse at center, #0f172a 0%, #020617 100%); }
  #header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 12px 16px; pointer-events: none;
    background: linear-gradient(180deg, rgba(11,18,32,0.95), rgba(11,18,32,0));
  }
  #title { font-size: 14px; font-weight: 600; }
  #stats { font-size: 11px; color: var(--muted); margin-top: 4px; }
  #stats b { color: var(--text); }
  #legend {
    position: absolute; bottom: 12px; left: 12px;
    background: rgba(17,24,39,0.9); border-radius: 6px; padding: 10px 12px;
    font-size: 10px; line-height: 1.5; color: var(--muted);
    border: 1px solid var(--panel2); max-width: 280px;
  }
  #legend h4 { margin: 0 0 4px 0; color: var(--text); font-size: 10px;
               text-transform: uppercase; letter-spacing: 1px; }
  #legend .group { margin-bottom: 8px; }
  #legend .row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
  #legend .chip { width: 12px; height: 12px; display: inline-block; flex-shrink: 0; }
  #legend .chip.circle { border-radius: 50%; }
  #legend .chip.hex { clip-path: polygon(25% 5%, 75% 5%, 100% 50%, 75% 95%, 25% 95%, 0% 50%); }
  #legend .chip.diamond { transform: rotate(45deg); }
  #legend .chip.square { border-radius: 3px; }
  #search {
    position: absolute; top: 12px; right: 12px;
    background: var(--panel); border: 1px solid var(--panel2); color: var(--text);
    padding: 6px 10px; border-radius: 6px; font-size: 12px; width: 220px;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }
  #controls {
    position: absolute; top: 52px; right: 12px;
    background: rgba(17,24,39,0.9); border: 1px solid var(--panel2);
    border-radius: 6px; padding: 6px 10px; font-size: 11px;
    display: flex; gap: 10px; align-items: center;
  }
  #controls button {
    background: var(--panel2); border: none; color: var(--text);
    padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 11px;
  }
  #controls button:hover { background: #374151; }
  #sidebar {
    width: 360px; background: var(--panel); border-left: 1px solid var(--panel2);
    overflow-y: auto; padding: 16px; display: none; position: relative;
  }
  #sidebar.open { display: block; }
  #sidebar h2 { font-size: 14px; margin: 0 0 6px 0; line-height: 1.3; }
  #sidebar .tags { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  #sidebar .tag {
    font-size: 10px; padding: 2px 6px; border-radius: 10px;
    background: var(--panel2); color: var(--text); text-transform: uppercase;
    letter-spacing: 0.5px; white-space: nowrap;
  }
  #sidebar .mass-bar {
    height: 4px; background: var(--panel2); border-radius: 2px; margin: 8px 0 14px 0;
    overflow: hidden;
  }
  #sidebar .mass-fill { height: 100%; background: var(--accent); }
  #sidebar .section { margin-top: 14px; }
  #sidebar .section h3 {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin: 0 0 6px 0;
  }
  #sidebar ul { padding-left: 18px; margin: 0; }
  #sidebar li { font-size: 12px; line-height: 1.4; margin-bottom: 3px; word-break: break-word; }
  #sidebar .edge-row { font-size: 11px; padding: 3px 0 3px 6px;
                       border-left: 2px solid var(--panel2); margin-bottom: 2px; }
  #sidebar .edge-row.type-support { border-left-color: #94a3b8; }
  #sidebar .edge-row.type-elaborate { border-left-color: #22c55e; }
  #sidebar .edge-row.type-cause { border-left-color: #06b6d4; }
  #sidebar .edge-row.type-dispute { border-left-color: #ef4444; }
  #sidebar .edge-row .arrow { color: var(--muted); margin: 0 4px; }
  #sidebar .edge-row a { color: var(--text); cursor: pointer; text-decoration: underline; }
  #sidebar .close-x {
    position: absolute; top: 10px; right: 14px; cursor: pointer;
    font-size: 20px; color: var(--muted); user-select: none;
  }
  #sidebar .close-x:hover { color: var(--text); }
  #sidebar .preview {
    background: var(--panel2); padding: 8px; border-radius: 4px;
    font-family: ui-monospace, monospace; font-size: 10px; line-height: 1.4;
    color: var(--muted); white-space: pre-wrap; word-break: break-word;
  }

  /* SVG graph styling */
  .node text.label { fill: #e5e7eb; font-size: 10px; text-anchor: middle;
                     pointer-events: none; user-select: none;
                     paint-order: stroke; stroke: #0b1220; stroke-width: 3px; stroke-linejoin: round; }
  .node.kind-concept { cursor: pointer; }
  .node.kind-concept .shape { stroke-width: 2px; stroke: #0b1220; fill-opacity: 0.95; }
  .node.kind-concept.nat-metaphysical .shape { fill: #f59e0b; stroke: #b45309; }
  .node.kind-concept.nat-normative .shape    { fill: #3b82f6; stroke: #1e3a8a; }
  .node.kind-concept.nat-factual .shape      { fill: #10b981; stroke: #065f46; }
  .node.kind-concept.state-retracted .shape  { stroke: #dc2626; stroke-width: 3px; stroke-dasharray: 4,3; }
  .node.kind-concept.state-consumed .shape   { stroke: #86efac; stroke-width: 3px; }
  .node.kind-concept.state-stale { opacity: 0.35; }
  .node.kind-concept.selected .shape { stroke: #fef3c7; stroke-width: 4px; }
  .node.kind-concept.dimmed { opacity: 0.12; }
  .node.no-label text.label { display: none; }

  .node.kind-turn { cursor: pointer; }
  .node.kind-turn .shape { fill: #6b7280; stroke: #111827; stroke-width: 1px; }
  .node.kind-turn.selected .shape { fill: #fef3c7; }
  .node.kind-turn.hidden { display: none; }

  .link { fill: none; stroke-opacity: 0.8; }
  .link.type-support   { stroke: #cbd5e1; stroke-width: 1.2px; }
  .link.type-elaborate { stroke: #22c55e; stroke-width: 1.5px; stroke-dasharray: 4,3; }
  .link.type-cause     { stroke: #06b6d4; stroke-width: 2.5px; }
  .link.type-dispute   { stroke: #ef4444; stroke-width: 3px; }
  .link.kind-hyperedge { stroke: #475569; stroke-width: 1px; stroke-opacity: 0.5; }
  .link.kind-hyperedge.hidden { display: none; }

  .link-label { fill: #cbd5e1; font-size: 8px; text-anchor: middle;
                paint-order: stroke; stroke: #0b1220; stroke-width: 3px; }
</style>
</head>
<body>
<div id="app">
  <div id="graph-pane">
    <svg id="graph"></svg>
    <div id="header">
      <div id="title">bellamem v0.2 — <span id="title-counts"></span></div>
      <div id="stats"></div>
    </div>
    <input id="search" type="text" placeholder="/ to search topic…" />
    <div id="controls">
      <button id="btn-fit">fit</button>
      <button id="btn-relayout">re-layout</button>
      <label><input type="checkbox" id="toggle-hubs" checked> hubs</label>
      <label><input type="checkbox" id="toggle-labels" checked> labels</label>
    </div>
    <div id="legend">
      <div class="group">
        <h4>shape = class</h4>
        <div class="row"><span class="chip hex" style="background:#64748b"></span>invariant (hexagon)</div>
        <div class="row"><span class="chip diamond" style="background:#64748b"></span>decision (diamond)</div>
        <div class="row"><span class="chip circle" style="background:#64748b"></span>observation (ellipse)</div>
        <div class="row"><span class="chip square" style="background:#64748b"></span>ephemeral (round-square)</div>
      </div>
      <div class="group">
        <h4>color = nature</h4>
        <div class="row"><span class="chip circle" style="background:var(--n-metaphysical)"></span>metaphysical</div>
        <div class="row"><span class="chip circle" style="background:var(--n-normative)"></span>normative</div>
        <div class="row"><span class="chip circle" style="background:var(--n-factual)"></span>factual</div>
      </div>
      <div class="group">
        <h4>size = mass · dot = turn-hub</h4>
      </div>
    </div>
  </div>
  <div id="sidebar">
    <span class="close-x" onclick="closeSidebar()">×</span>
    <h2 id="s-topic"></h2>
    <div class="tags" id="s-tags"></div>
    <div style="font-size:10px; color: var(--muted)">mass</div>
    <div class="mass-bar"><div class="mass-fill" id="s-mass"></div></div>
    <div id="s-turn-preview-wrap" style="display:none">
      <div class="section">
        <h3>turn preview</h3>
        <div class="preview" id="s-preview"></div>
      </div>
    </div>
    <div class="section">
      <h3>voices</h3>
      <ul id="s-voices"></ul>
    </div>
    <div class="section">
      <h3>sources (<span id="s-src-count"></span>)</h3>
      <ul id="s-sources"></ul>
    </div>
    <div class="section">
      <h3>edges</h3>
      <div id="s-edges"></div>
    </div>
  </div>
</div>

<script>
const PAYLOAD = /*__PAYLOAD__*/ null /*__END_PAYLOAD__*/;

function truncate(s, n) {
  if (!s) return "";
  return s.length > n ? s.slice(0, n - 1) + "…" : s;
}

// Mass → node radius. m=[0.5, 0.75] → r=[10, 39]
function massRadius(m) {
  const t = Math.max(0, Math.min(1, (m - 0.5) / 0.25));
  return 10 + t * 29;
}

// Shape generators that return an SVG string inside a g.shape <path>
// or direct element. Each shape is centered at (0,0) with radius r.
function shapeForClass(cls, r) {
  if (cls === "invariant") {
    // Hexagon
    const pts = [];
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI / 3) * i - Math.PI / 2;
      pts.push(`${(r * Math.cos(a)).toFixed(1)},${(r * Math.sin(a)).toFixed(1)}`);
    }
    return { tag: "polygon", attrs: { points: pts.join(" ") } };
  }
  if (cls === "decision") {
    // Diamond
    return { tag: "polygon", attrs: { points: `0,${-r} ${r},0 0,${r} ${-r},0` } };
  }
  if (cls === "observation") {
    // Ellipse (wider than tall)
    return { tag: "ellipse", attrs: { cx: 0, cy: 0, rx: r * 1.15, ry: r * 0.85 } };
  }
  // ephemeral → rounded square
  return { tag: "rect", attrs: {
    x: -r * 0.9, y: -r * 0.9, width: r * 1.8, height: r * 1.8, rx: r * 0.25, ry: r * 0.25
  } };
}

// Assemble node list (concepts + turn hubs)
const nodes = [];
for (const c of PAYLOAD.concepts) {
  nodes.push({
    id: c.id,
    kind: "concept",
    cls: c.class,
    nature: c.nature,
    state: c.state,
    mass: c.mass,
    topic: c.topic,
    full: c,
    r: massRadius(c.mass),
  });
}
for (const t of PAYLOAD.turns) {
  nodes.push({
    id: "turn:" + t.id,
    kind: "turn",
    full: t,
    r: 5,
  });
}

// Edges — both structural (cc) and hyperedges (turn → concept)
const links = [];
for (const e of PAYLOAD.edges) {
  links.push({
    id: "cc:" + e.id,
    source: e.source,
    target: e.target,
    type: e.type,
    kind: "structural",
    full: e,
  });
}
for (const e of PAYLOAD.turn_edges) {
  links.push({
    id: "hyp:" + e.id,
    source: "turn:" + e.source,
    target: e.target,
    type: e.type,
    kind: "hyperedge",
    full: e,
  });
}

// Drop links whose endpoints aren't in our node set.
const nodeIds = new Set(nodes.map(n => n.id));
const validLinks = links.filter(l => nodeIds.has(l.source) && nodeIds.has(l.target));

// ----- Render -----
const svg = d3.select("#graph");
const width = () => svg.node().clientWidth || 1200;
const height = () => svg.node().clientHeight || 800;

const root = svg.append("g").attr("id", "root");
const linkLayer = root.append("g").attr("class", "links");
const nodeLayer = root.append("g").attr("class", "nodes");

const zoom = d3.zoom()
  .scaleExtent([0.15, 3.5])
  .on("zoom", (event) => root.attr("transform", event.transform));
svg.call(zoom);
svg.on("click", (event) => {
  if (event.target === svg.node() || event.target.tagName === "g") closeSidebar();
});

// Link selection
const link = linkLayer.selectAll("line.link")
  .data(validLinks, d => d.id)
  .join("line")
  .attr("class", d => `link kind-${d.kind}${d.kind === "structural" ? " type-" + d.type : ""}`);

// Edge labels (only for structural cc edges)
const linkLabel = linkLayer.selectAll("text.link-label")
  .data(validLinks.filter(l => l.kind === "structural"), d => d.id)
  .join("text")
  .attr("class", "link-label")
  .text(d => d.type);

// Node selection (grouped <g> with a shape + label)
const node = nodeLayer.selectAll("g.node")
  .data(nodes, d => d.id)
  .join("g")
  .attr("class", d => {
    if (d.kind === "turn") return "node kind-turn";
    const parts = ["node kind-concept", `cls-${d.cls}`, `nat-${d.nature}`];
    if (d.state) parts.push(`state-${d.state}`);
    return parts.join(" ");
  })
  .on("click", (event, d) => {
    event.stopPropagation();
    if (d.kind === "concept") selectConcept(d.full);
    else selectTurn(d.full);
  })
  .call(d3.drag()
    .on("start", (event, d) => {
      if (!event.active) sim.alphaTarget(0.3).restart();
      d.fx = d.x; d.fy = d.y;
    })
    .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
    .on("end", (event, d) => {
      if (!event.active) sim.alphaTarget(0);
      d.fx = null; d.fy = null;
    }));

// Inject shape element per node
node.each(function (d) {
  const g = d3.select(this);
  if (d.kind === "turn") {
    g.append("circle").attr("class", "shape").attr("r", d.r);
    return;
  }
  const shape = shapeForClass(d.cls, d.r);
  const el = g.append(shape.tag).attr("class", "shape");
  for (const [k, v] of Object.entries(shape.attrs)) el.attr(k, v);
  g.append("text")
    .attr("class", "label")
    .attr("y", d.r + 12)
    .text(truncate(d.topic, 34));
});

// ----- Force simulation -----
// Tuned for a tight concept-map feel: short links, mild repulsion,
// gentle inward gravity so clusters settle around the center
// instead of dispersing to the viewport edges. Hyperedges pull
// hub+spokes together more firmly than structural cc-edges so
// each hub reads as a visible rosette.
const sim = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(validLinks).id(d => d.id)
    .distance(l => l.kind === "hyperedge" ? 28 : 55)
    .strength(l => l.kind === "hyperedge" ? 0.9 : 0.5))
  .force("charge", d3.forceManyBody()
    .strength(d => d.kind === "turn" ? -30 : -110)
    .distanceMax(360))
  .force("center", d3.forceCenter(width() / 2, height() / 2))
  .force("x", d3.forceX(width() / 2).strength(0.05))
  .force("y", d3.forceY(height() / 2).strength(0.05))
  .force("collide", d3.forceCollide().radius(d => d.r + 4).strength(0.9))
  .alphaDecay(0.035)
  .on("tick", tick)
  .on("end", () => fitToView(40));

function tick() {
  link
    .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  linkLabel
    .attr("x", d => (d.source.x + d.target.x) / 2)
    .attr("y", d => (d.source.y + d.target.y) / 2);
  node.attr("transform", d => `translate(${d.x},${d.y})`);
}

function fitToView(pad = 40) {
  const xs = nodes.map(n => n.x).filter(Number.isFinite);
  const ys = nodes.map(n => n.y).filter(Number.isFinite);
  if (!xs.length) return;
  const minX = Math.min(...xs) - 60, maxX = Math.max(...xs) + 60;
  const minY = Math.min(...ys) - 60, maxY = Math.max(...ys) + 60;
  const w = maxX - minX, h = maxY - minY;
  const vw = width(), vh = height();
  const scale = Math.min((vw - 2 * pad) / w, (vh - 2 * pad) / h, 1.5);
  const tx = (vw - (minX + maxX) * scale) / 2;
  const ty = (vh - (minY + maxY) * scale) / 2;
  svg.transition().duration(400).call(
    zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}

// ----- Sidebar -----
function selectConcept(c) {
  d3.selectAll("g.node").classed("selected", false);
  d3.selectAll("g.node")
    .filter(d => d.kind === "concept" && d.id === c.id)
    .classed("selected", true);

  document.getElementById("s-topic").textContent = c.topic;
  const tags = document.getElementById("s-tags");
  tags.innerHTML = "";
  [c.class, c.nature, c.state].filter(Boolean).forEach(t => {
    const el = document.createElement("span");
    el.className = "tag"; el.textContent = t; tags.appendChild(el);
  });
  document.getElementById("s-mass").style.width = `${Math.round(c.mass * 100)}%`;
  document.getElementById("s-turn-preview-wrap").style.display = "none";

  const voicesEl = document.getElementById("s-voices");
  voicesEl.innerHTML = c.voices.length
    ? c.voices.map(v => `<li>${v}</li>`).join("")
    : "<li style='color:var(--muted)'>none yet</li>";

  document.getElementById("s-src-count").textContent = c.source_refs.length;
  document.getElementById("s-sources").innerHTML =
    c.source_refs.slice(0, 20).map(sr => `<li><code style="font-size:10px">${sr}</code></li>`).join("");

  const related = PAYLOAD.edges.filter(e => e.source === c.id || e.target === c.id);
  const edgeEl = document.getElementById("s-edges");
  if (!related.length) {
    edgeEl.innerHTML = "<div style='font-size:11px;color:var(--muted)'>no structural edges</div>";
  } else {
    edgeEl.innerHTML = related.map(e => {
      const otherId = e.source === c.id ? e.target : e.source;
      const other = PAYLOAD.concepts.find(x => x.id === otherId);
      const arrow = e.source === c.id ? "→" : "←";
      return `<div class="edge-row type-${e.type}">
        <span style="color:var(--muted)">${e.type}</span>
        <span class="arrow">${arrow}</span>
        <a onclick="selectById('${otherId}')">${other ? truncate(other.topic, 36) : otherId}</a>
      </div>`;
    }).join("");
  }
  document.getElementById("sidebar").classList.add("open");
}

function selectTurn(t) {
  d3.selectAll("g.node").classed("selected", false);
  d3.selectAll("g.node")
    .filter(d => d.kind === "turn" && d.id === "turn:" + t.id)
    .classed("selected", true);

  document.getElementById("s-topic").textContent = `turn ${t.id}`;
  const tags = document.getElementById("s-tags");
  tags.innerHTML = "";
  [t.speaker, t.session_id?.slice(0,8)].filter(Boolean).forEach(x => {
    const el = document.createElement("span");
    el.className = "tag"; el.textContent = x; tags.appendChild(el);
  });
  document.getElementById("s-mass").style.width = "0%";
  document.getElementById("s-turn-preview-wrap").style.display = "block";
  document.getElementById("s-preview").textContent = t.preview || "(no preview)";
  document.getElementById("s-voices").innerHTML = "";
  document.getElementById("s-src-count").textContent = "1";
  document.getElementById("s-sources").innerHTML =
    `<li><code style="font-size:10px">${t.id}</code></li>`;

  const spokes = PAYLOAD.turn_edges.filter(e => e.source === t.id);
  const edgeEl = document.getElementById("s-edges");
  edgeEl.innerHTML = spokes.map(e => {
    const other = PAYLOAD.concepts.find(x => x.id === e.target);
    return `<div class="edge-row type-${e.type}">
      <span style="color:var(--muted)">${e.type}</span>
      <span class="arrow">→</span>
      <a onclick="selectById('${e.target}')">${other ? truncate(other.topic, 36) : e.target}</a>
    </div>`;
  }).join("");
  document.getElementById("sidebar").classList.add("open");
}

function selectById(id) {
  const c = PAYLOAD.concepts.find(x => x.id === id);
  if (c) selectConcept(c);
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  d3.selectAll("g.node").classed("selected", false);
}

// Header stats
const m = PAYLOAD.meta;
document.getElementById("title-counts").textContent =
  `${m.n_concepts}/${m.n_total_concepts} concepts · ${PAYLOAD.turns.length} turn-hubs · ${m.n_edges} cc-edges · ${PAYLOAD.turn_edges.length} hyperedges`;
document.getElementById("stats").innerHTML =
  Object.entries(m.class_counts).map(([k, v]) => `<b>${v}</b> ${k}`).join(" · ");

// Controls
document.getElementById("btn-fit").onclick = () => fitToView(40);
document.getElementById("btn-relayout").onclick = () => {
  nodes.forEach(n => { n.fx = null; n.fy = null; });
  sim.alpha(1).restart();
};
document.getElementById("toggle-hubs").onchange = (e) => {
  const hidden = !e.target.checked;
  d3.selectAll("g.node.kind-turn").classed("hidden", hidden);
  d3.selectAll("line.link.kind-hyperedge").classed("hidden", hidden);
};
document.getElementById("toggle-labels").onchange = (e) => {
  d3.selectAll("g.node.kind-concept").classed("no-label", !e.target.checked);
};

// Search
const searchEl = document.getElementById("search");
searchEl.addEventListener("input", () => {
  const q = searchEl.value.trim().toLowerCase();
  d3.selectAll("g.node.kind-concept").classed("dimmed", function (d) {
    if (!q) return false;
    return !(d.topic || "").toLowerCase().includes(q);
  });
});
document.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement !== searchEl) {
    e.preventDefault(); searchEl.focus();
  }
  if (e.key === "Escape") {
    closeSidebar(); searchEl.blur(); searchEl.value = "";
    searchEl.dispatchEvent(new Event("input"));
  }
});

// Resize → recenter
window.addEventListener("resize", () => {
  sim.force("center", d3.forceCenter(width() / 2, height() / 2));
  sim.alpha(0.2).restart();
});
</script>
</body>
</html>
